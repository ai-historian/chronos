name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  build:
    name: Build & typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: |
            chronos/package-lock.json
            chronos-vscode/package-lock.json

      # chronos pi-package — npm ci resolves the @mariozechner peer deps; tsc emits dist/
      - name: Install chronos
        working-directory: chronos
        run: npm ci
      - name: Build chronos (tsc)
        working-directory: chronos
        run: npm run build

      # chronos-vscode — esbuild does NOT type-check, so run both tsconfigs explicitly
      - name: Install chronos-vscode
        working-directory: chronos-vscode
        run: npm ci
      - name: Typecheck host (src/)
        working-directory: chronos-vscode
        run: npx tsc --noEmit -p tsconfig.json
      - name: Typecheck webview
        working-directory: chronos-vscode
        run: npx tsc --noEmit -p webview/tsconfig.json
      - name: Bundle (esbuild)
        working-directory: chronos-vscode
        run: npm run build

      # Guard against the two release-packaging bugs we hit: a stale webview
      # bundle (missing UI components) and a dropped external dep (mupdf).
      # Package the real .vsix (vscode:prepublish rebuilds it) and assert both.
      - name: Verify packaged .vsix contents
        working-directory: chronos-vscode
        run: |
          npx vsce package -o /tmp/chronos.vsix
          unzip -p /tmp/chronos.vsix extension/out/webview/main.js | grep -q "chronos-data-viewer" \
            || { echo "::error::data viewer missing from packaged webview bundle (stale out/?)"; exit 1; }
          unzip -l /tmp/chronos.vsix | grep -q "node_modules/mupdf/" \
            || { echo "::error::mupdf missing from package (esbuild marks it external)"; exit 1; }

  ui-test:
    name: UI test (headless VS Code)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: chronos-vscode/package-lock.json

      - name: Install chronos-vscode
        working-directory: chronos-vscode
        run: npm ci

      - name: Install xvfb
        run: sudo apt-get update && sudo apt-get install -y xvfb

      # npm test = esbuild bundle + run-ui-test.mjs. The test drives a deterministic
      # mock pi (no real agent / API keys) and downloads VS Code into .vscode-test/.
      - name: Run UI test
        working-directory: chronos-vscode
        run: xvfb-run -a npm test
